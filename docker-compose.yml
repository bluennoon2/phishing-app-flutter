services:
  # MariaDB 설정
  mariadb:
    image: mariadb:latest
    container_name: smishing-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smishing   # 스키마에 정의된 DB 이름
      MYSQL_USER: root         # .env에 들어갈 유저
      MYSQL_PASSWORD: rootpassword # .env에 들어갈 비밀번호
    ports:
      - "3306:3306"

  # Redis 설정
  redis:
    image: redis:alpine
    container_name: smishing-redis
    restart: always
    ports:
      - "6379:6379"